<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  
  <!-- Outer glowing circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad)" stroke-width="8" opacity="0.4" />
  
  <!-- Glowing Brain/AI Icon in the center -->
  <g transform="translate(128, 128) scale(0.5)" filter="url(#glow)">
    <!-- SVG Path for a stylized brain/chip -->
    <path d="M256,64 C190,64 128,110 128,192 C128,240 150,270 170,290 C185,305 192,320 192,340 C192,360 205,372 224,372 L288,372 C307,372 320,360 320,340 C320,320 327,305 342,290 C362,270 384,240 384,192 C384,110 322,64 256,64 Z" fill="url(#grad)" />
    <!-- Pulse network nodes -->
    <circle cx="256" cy="192" r="16" fill="#ffffff" />
    <circle cx="210" cy="150" r="12" fill="#ffffff" opacity="0.8" />
    <circle cx="302" cy="150" r="12" fill="#ffffff" opacity="0.8" />
    <circle cx="190" cy="210" r="12" fill="#ffffff" opacity="0.8" />
    <circle cx="322" cy="210" r="12" fill="#ffffff" opacity="0.8" />
    <!-- Connecting lines -->
    <line x1="256" y1="192" x2="210" y2="150" stroke="#ffffff" stroke-width="4" opacity="0.6" />
    <line x1="256" y1="192" x2="302" y2="150" stroke="#ffffff" stroke-width="4" opacity="0.6" />
    <line x1="256" y1="192" x2="190" y2="210" stroke="#ffffff" stroke-width="4" opacity="0.6" />
    <line x1="256" y1="192" x2="322" y2="210" stroke="#ffffff" stroke-width="4" opacity="0.6" />
  </g>
</svg>
